name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (engine + render + MCP session)
        run: npm run test

      - name: Build
        run: npm run build

      - name: MCP smoke (stdio round-trip)
        run: npm run mcp:smoke

      - name: MCP smoke against the npx bundle
        run: SMOKE_SERVER="node bin/frameless-mcp.mjs" npm run mcp:smoke
