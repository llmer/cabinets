<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- frame(less) — parens-as-frame mark on a parchment tile (survives light & dark tab strips) -->
  <rect x="0" y="0" width="100" height="100" rx="20" fill="#F6F0E1"/>
  <rect x="1" y="1" width="98" height="98" rx="19" fill="none" stroke="#E5DAC2" stroke-width="2"/>
  <!-- open U carcass: butt-joined, squared -->
  <path d="M38 28 L38 66 L62 66 L62 28" fill="none" stroke="#1A1410" stroke-width="11" stroke-linecap="butt" stroke-linejoin="miter"/>
  <!-- parentheses: ~110° open arcs, typographic butt-cut terminals -->
  <path d="M25 20 A36.6 36.6 0 0 0 25 80" fill="none" stroke="#1A1410" stroke-width="11" stroke-linecap="butt"/>
  <path d="M75 20 A36.6 36.6 0 0 1 75 80" fill="none" stroke="#1A1410" stroke-width="11" stroke-linecap="butt"/>
  <!-- 32mm line-bore rows: parchment knockouts, symmetric on both legs -->
  <g fill="#F6F0E1">
    <circle cx="38" cy="40" r="2.4"/><circle cx="38" cy="50" r="2.4"/><circle cx="38" cy="60" r="2.4"/>
    <circle cx="62" cy="40" r="2.4"/><circle cx="62" cy="50" r="2.4"/><circle cx="62" cy="60" r="2.4"/>
  </g>
</svg>
